apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Dev environment overlay.
# Deploys everything from base into the "voting" namespace.
namespace: voting

resources:
  - ../../base

# ---------------------------------------------------------------------------
# IMAGE VARIABLES (single source of truth for registry + tag, per app)
# ---------------------------------------------------------------------------
# base/ uses registry-agnostic names (votingapp-vote / -result / -worker).
# Here we set BOTH the registry (newName) and the tag (newTag) for each app.
# Update this block to change what gets deployed. The CI pipeline can update it via:
#   kustomize edit set image votingapp-vote=<registry>/votingapp-vote:<tag>
images:
  - name: votingapp-vote
    newName: votingappregistry7.azurecr.io/votingapp-vote
    newTag: "1.0.20108"
  - name: votingapp-result
    newName: votingappregistry7.azurecr.io/votingapp-result
    newTag: "1.0.20107"
  - name: votingapp-worker
    newName: votingappregistry7.azurecr.io/votingapp-worker
    newTag: "1.0.20111"
