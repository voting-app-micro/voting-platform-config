apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# All base resources for the voting application.
# Environment-specific values (namespace, image tags) are set in overlays/.
resources:
  - vote/deployment.yaml
  - vote/service.yaml
  - result/deployment.yaml
  - result/service.yaml
  - worker/deployment.yaml
  - redis/deployment.yaml
  - redis/service.yaml
  - db/deployment.yaml
  - db/service.yaml
